name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3

        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
          -t ghcr.io/m-ali-fouladi/cloud-api:latest \
          -f docker/Dockerfile .

      - name: Push Docker image
        run: |
          docker push ghcr.io/m-ali-fouladi/cloud-api:latest
